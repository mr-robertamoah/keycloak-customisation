apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_REALM
              value: "blog"
            - name: KEYCLOAK_CLIENT_ID
              value: "auth-service"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "auth-service-secret"
            - name: BLOG_SERVICE_URL
              value: "http://blog-service:8002"
            - name: DATABASE_URL
              value: "postgresql://keycloak:keycloak_secret@postgres:5432/auth_db"
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001
      protocol: TCP
