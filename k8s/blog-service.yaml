apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-service
  labels:
    app: blog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-service
  template:
    metadata:
      labels:
        app: blog-service
    spec:
      containers:
        - name: blog-service
          image: blog-service:latest
          imagePullPolicy: Never
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_REALM
              value: "blog"
            - name: KEYCLOAK_CLIENT_ID
              value: "blog-service"
            - name: KEYCLOAK_CLIENT_SECRET
              value: "blog-service-secret"
            - name: DATABASE_URL
              value: "postgresql://keycloak:keycloak_secret@postgres:5432/blog_db"
          ports:
            - containerPort: 8002
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: blog-service
  labels:
    app: blog-service
spec:
  type: NodePort
  selector:
    app: blog-service
  ports:
    - port: 8002
      targetPort: 8002
      nodePort: 30002
      protocol: TCP
